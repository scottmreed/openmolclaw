# OpenMolClaw — OpenRouter ZDR Mode (privacy-forward).
#
# Routes OpenRouter requests only to Zero Data Retention endpoints, denies
# provider data collection, and disables provider fallbacks. ZDR Mode only
# affects requests this local app sends to OpenRouter — it does not change your
# OpenRouter account logging, OS logs, browser extensions, proxies, custom
# providers, or local workspace files.
#
# Set the key in your environment (never commit it):
#   export OPENROUTER_API_KEY=...
model:
  provider: openrouter
  model: allenai/olmo-2-0325-32b-instruct
  base_url: https://openrouter.ai/api/v1
  require_tool_support: true
  preflight: false
  privacy:
    # Require Zero Data Retention endpoints for every OpenRouter request.
    openrouter_zdr: true
    # Avoid providers that may collect/store request data.
    deny_data_collection: true
    # Never silently route to a backup provider (privacy over uptime).
    allow_fallbacks: false
    # Only route to endpoints that support the requested tool parameters.
    require_parameters: true
    # If ZDR-endpoint preflight is enabled and cannot verify a ZDR endpoint,
    # fail closed rather than send the structure. Preflight itself is opt-in via
    # OPENMOLCLAW_OPENROUTER_ZDR_PREFLIGHT=1.
    fail_closed_zdr_preflight: true

workspace:
  # local_json (default) writes rendered structures to .openmolclaw/workspaces;
  # memory_only keeps them in process memory only and never writes to disk.
  save_mode: memory_only
